{% extends 'base.html' %}

{% block title %}Crear una Nueva Cuenta | MotoSafe{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 420px;
        margin: 3rem auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-header h1 {
        font-size: 1.75rem;
        color: var(--text-main);
        margin-bottom: 0.5rem;
    }

    .login-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--text-main);
        font-size: 0.95rem;
    }

    .form-control {
        width: 100%;
        padding: 0.8rem 1rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 1rem;
        color: var(--text-main);
        background: var(--background);
        transition: all 0.2s ease;
        box-sizing: border-box; 
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        background: var(--surface);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .btn-block {
        width: 100%;
        justify-content: center;
        padding: 0.9rem;
        font-size: 1.05rem;
        margin-top: 1rem;
    }

    .login-footer {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.95rem;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        padding-top: 1.5rem;
    }
    
    .login-footer a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
    }
    
    .login-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-header">
        <i data-lucide="user-plus" size="52" color="var(--primary)" style="margin-bottom: 1rem;"></i>
        <h1>Crear una Cuenta Nueva</h1>
        <p>Únete a MotoSafe y protege tu viaje con estilo.</p>
    </div>

    <!-- HCI: Proceso de registro simple sin campos redundantes reduce abandono -->
    <form action="{{ url_for('registro') }}" method="POST">
        <div class="form-group">
            <label for="username">Nombre de Usuario</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Ej. jperez123" required>
        </div>
        
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            Registrarme <i data-lucide="arrow-right" size="20"></i>
        </button>
    </form>

    <div class="login-footer">
        ¿Ya tienes una cuenta? <br>
        <a href="{{ url_for('login') }}" style="display:inline-block; margin-top:0.5rem;">Iniciar sesión aquí</a>
    </div>
</div>
{% endblock %}
